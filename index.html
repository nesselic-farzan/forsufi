<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sama Emotional Cycle™</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(-45deg, #1e1e2f, #2c2c54, #3b3b98, #1e3799);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating circles decoration */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: floatUp 15s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    .container {
      width: 90%;
      max-width: 400px;
      z-index: 2;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      animation: textColorShift 4s linear infinite;
    }

    @keyframes textColorShift {
      0% { color: #ff6b81; }
      25% { color: #70a1ff; }
      50% { color: #7bed9f; }
      75% { color: #ffa502; }
      100% { color: #ff6b81; }
    }

    .status {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      min-height: 80px;
      margin-bottom: 20px;
      font-size: 18px;
      transition: 0.3s ease;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:active {
      transform: scale(0.96);
    }

    .small-btn {
      margin-top: 15px;
      background: #3742fa;
    }
  </style>
</head>
<body>

  <!-- Decorative floating bubbles -->
  <div class="bubble" style="width:60px;height:60px;left:10%;animation-duration:18s;"></div>
  <div class="bubble" style="width:40px;height:40px;left:30%;animation-duration:12s;"></div>
  <div class="bubble" style="width:80px;height:80px;left:70%;animation-duration:20s;"></div>
  <div class="bubble" style="width:50px;height:50px;left:85%;animation-duration:15s;"></div>

  <div class="container">
    <h1>Sama Emotional Cycle™</h1>

    <div class="status" id="status">
      Status: Emotionally Stable (for now)
    </div>

    <button onclick="nextStage()">Start Emotional Cycle</button>
    <button class="small-btn" onclick="didntReply()">She Didn’t Reply</button>
  </div>

  <script>
    const stages = [
      "😄 She Texted! Life is good.",
      "😐 Wait… she texted him too.",
      "😔 Overthinking has begun.",
      "😭 I don’t think she cares about me bro.",
      "🧠 You give motivational speech.",
      "😌 Stability restored. I’m fine now.",
      "🔁 Resetting cycle for tomorrow..."
    ];

    let currentStage = 0;

    function nextStage() {
      document.getElementById("status").innerText = stages[currentStage];

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      currentStage++;
      if (currentStage >= stages.length) {
        currentStage = 0;
      }
    }

    function didntReply() {
      document.getElementById("status").innerText = "📵 She didn’t reply. Initiating Sad Mode.";

      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
      }
    }
  </script>
</body>
</html>
